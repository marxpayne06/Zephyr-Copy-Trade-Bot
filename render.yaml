services:
  - type: web
    name: zephyr-trading-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false  # Set in Render dashboard
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
    healthCheckPath: /
