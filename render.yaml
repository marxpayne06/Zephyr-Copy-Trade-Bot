services:
  - type: web
    name: zephyr-copy-trade-bot
    runtime: python
    # This command ensures pip is up to date before installing dependencies
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: BOT_TOKEN
        sync: false  # You must set this manually in the Render Dashboard
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
    healthCheckPath: /
